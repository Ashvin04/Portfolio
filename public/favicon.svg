<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      @font-face {
        font-family: 'Persona5Menu';
        src: url('/fonts/Persona5MenuFontPrototype-Regular.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
      }
      .text-bg {
        font-family: 'Persona5Menu', Impact, sans-serif;
        font-size: 42px;
        fill: #000000;
        stroke: #000000;
        stroke-width: 6px;
        stroke-linejoin: miter;
      }
      .text-main {
        font-family: 'Persona5Menu', Impact, sans-serif;
        font-size: 42px;
        fill: #ffffff;
      }
    </style>
  </defs>
  <!-- Background P5 Red skewed card -->
  <polygon points="2,8 62,2 58,60 6,56" fill="#080808" />
  <polygon points="5,11 59,5 54,56 9,52" fill="#e60012" />

  <!-- Shadow text for outline -->
  <text x="32" y="46" text-anchor="middle" class="text-bg" transform="rotate(-7 32 32)">A.J</text>
  <!-- Main white text -->
  <text x="32" y="46" text-anchor="middle" class="text-main" transform="rotate(-7 32 32)">A.J</text>
</svg>